name: Build and Push

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.mmonit.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Get M/Monit version
        id: mmonit
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building M/Monit version $VERSION"

  build:
    needs: get-version
    uses: jchonig/workflows/.github/workflows/docker-build.yml@main
    with:
      image_name: mmonit
      build_args: mmonit_version=${{ needs.get-version.outputs.version }}
      tags: |
        type=raw,value=${{ needs.get-version.outputs.version }},enable=${{ github.ref == 'refs/heads/master' }}
        type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
        type=raw,value=backup-${{ needs.get-version.outputs.version }},enable=${{ github.ref == 'refs/heads/backup' }}
        type=ref,event=branch,enable=${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/backup' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  keepalive:
    if: github.event_name == 'schedule'
    uses: jchonig/workflows/.github/workflows/keepalive.yml@main
    permissions:
      actions: write
